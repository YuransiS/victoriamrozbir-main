<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дякуємо за покупку | Віка Мещерякова</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
        rel="stylesheet">
    <!-- Animation CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mono: { bg: '#F9F9F9', black: '#0F0F0F', grey: '#6B6B6B', light: '#E5E5E5' }
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    <!-- Meta Pixel Code -->
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                    n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script',
            'https://connect.facebook.net/en_US/fbevents.js');

        // Advanced Matching data
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderReference') || '';
        const leadName = (localStorage.getItem('lead_name') || '').trim().toLowerCase();
        const leadPhone = (localStorage.getItem('lead_phone') || '').replace(/\D/g, '');

        fbq('init', '1230047148487254', {
            fn: leadName,
            ph: leadPhone,
            external_id: orderId
        });
        fbq('track', 'PageView');

        // Purchase Event using saved price
        const savedPrice = localStorage.getItem('purchase_price') || '390';
        fbq('track', 'Purchase', {
            value: parseFloat(savedPrice),
            currency: 'UAH',
            content_name: 'Персональна Діагностика Віка',
            content_type: 'product',
            content_ids: ['diag_v_1'],
            external_id: orderId
        });
    </script>
    <noscript><img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=1230047148487254&ev=PageView&noscript=1" /></noscript>
    <!-- End Meta Pixel Code -->

    <style>
        body {
            background: radial-gradient(circle at top left, #F9F9F9 0%, #F1F1F1 100%);
            color: #0F0F0F;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.05);
        }
        .gradient-text {
            background: linear-gradient(135deg, #0f0f0f 0%, #444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            position: relative;
        }
        .success-checkmark .check-icon {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
            box-sizing: content-box;
            border: 4px solid #000;
        }
        .success-checkmark .check-icon::before {
            content: "";
            position: absolute;
            background: #000;
            height: 100px;
            width: 40px;
            transform: rotate(-45deg);
            top: 26px;
            left: 16px;
            animation: check-scale 0.5s ease-in-out forwards;
        }
        @keyframes check-scale {
            from { transform: rotate(-45deg) scale(0); }
            to { transform: rotate(-45deg) scale(1); }
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col justify-center items-center px-4">
    
    <!-- Background Decor -->
    <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-gray-200/20 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-gray-300/10 blur-[100px] rounded-full pointer-events-none"></div>

    <div class="max-w-md w-full glass-card p-10 md:p-14 text-center rounded-3xl animate__animated animate__fadeInUp">
        
        <div class="mb-10 flex justify-center">
            <div class="relative">
                <div class="w-20 h-20 bg-black rounded-full flex items-center justify-center animate__animated animate__heartBeat animate__delay-1s">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="white"
                        class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                    </svg>
                </div>
                <div class="absolute -inset-2 bg-black/5 rounded-full animate-ping"></div>
            </div>
        </div>

        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-mono-grey mb-4 animate__animated animate__fadeIn animate__delay-1s">Успішна оплата</p>
        
        <h1 class="font-serif text-4xl md:text-5xl font-bold mb-6 gradient-text animate__animated animate__fadeIn animate__delay-1s">
            ДЯКУЄМО!
        </h1>
        
        <div class="w-12 h-[1px] bg-black/20 mx-auto mb-8"></div>
        
        <p class="text-gray-600 mb-10 font-light leading-relaxed text-sm md:text-base animate__animated animate__fadeIn animate__delay-2s">
            Ваша оплата за <span class="text-black font-bold">персональний розбір</span> пройшла успішно. 
            Чекайте на повідомлення в Telegram найближчим часом для початку роботи.
        </p>

        <div class="animate__animated animate__fadeInUp animate__delay-2s">
            <a href="index.html"
                class="group relative inline-flex w-full bg-black text-white py-5 text-[11px] font-bold uppercase tracking-[0.2em] transform transition-all hover:scale-[1.02] active:scale-95 justify-center items-center overflow-hidden rounded-xl">
                <span class="relative z-10">Повернутися на сайт</span>
                <div class="absolute inset-0 bg-white/10 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-500"></div>
            </a>
            
            <p class="mt-8 text-[9px] text-mono-grey uppercase tracking-widest font-medium opacity-60">
                Замовлення: <span id="order-ref" class="text-black">...</span>
            </p>
        </div>
    </div>

    <script>
        // Set order reference in UI
        document.getElementById('order-ref').textContent = orderId || 'ОБРОБЛЕНО';
    </script>
</body>

</html>
